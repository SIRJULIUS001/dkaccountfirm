<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | DK ACCOUNT FIRM</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --sky-blue: #0ea5e9; --dark-charcoal: #1A202C; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f9ff; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .success-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .check-icon {
            font-size: 80px;
            color: #22c55e;
            margin-bottom: 20px;
        }
        .btn-home {
            background-color: var(--sky-blue);
            color: white;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
            margin-top: 20px;
        }
        .btn-home:hover { background-color: #0284c7; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="check-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="fw-bold">Thank You!</h1>
        <p class="lead text-muted">Your message has been successfully sent to DK Account Firm.</p>
        <p>Our team will review your inquiry and get back to you within 24 hours.</p>
        
        <a href="index.html" class="btn btn-home">Return to Home</a>
    </div>

</body>
</html>
